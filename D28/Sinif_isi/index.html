<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinif_isi</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <form action="">
        <label for="ad">Name</label>
        <input type="text" id="ad" name="ad" placeholder="Adınızı yazında pls" required>

        <label for="soyad">Surname</label>
        <input type="text" id="soyad" name="soyad" placeholder="Soyadınızı yazında pls" required>

        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="18" max="99" required placeholder="age">

        <label for="pass">Password</label>
        <input type="text" id="pass" name="pass" placeholder="Password" required>

        <label for="mail">Gmail</label>
        <input type="text" id="mail" name="mail" required placeholder="Gmail">

        <button type="submit">Yadda saxla</button>
        <button type="reset">reset</button>
    </form>
</body>
</html>
